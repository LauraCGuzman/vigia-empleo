# ══════════════════════════════════════════════════════════════
# SKILLS — Job Sentinel  ·  HABILIDADES — Vigía de Empleo
# ══════════════════════════════════════════════════════════════
#
# This file defines your technical skills and current level.
# The system uses them to:
#   1. Identify which skills the market demands each week.
#   2. Show your status for each skill in the email and dashboard.
#
# Este archivo define tus skills técnicas y tu nivel actual.
# El sistema las usa para:
#   1. Identificar qué skills pide el mercado cada semana.
#   2. Mostrar en el email y el dashboard tu estado de cada una.
#
# HOW TO EDIT / CÓMO EDITAR:
#   - nivel: consolidado  → you already master it (green ✅)  /  ya lo dominas (verde ✅)
#   - nivel: aprendiendo  → in progress (orange 🔄)  /  en proceso (naranja 🔄)
#   - nivel: pendiente    → not yet (red ❌)  /  aún no lo tienes (rojo ❌)
#
#   - aliases: other names the skill might appear under in listings
#              (in English, in Spanish, abbreviations...). Case-insensitive.
#   - aliases: otros nombres con los que puede aparecer en las ofertas
#              (en inglés, en español, abreviaturas...). No distingue mayúsculas.
#
# ADDING A NEW SKILL / AÑADIR UNA SKILL NUEVA:
#   - nombre: My New Skill
#     nivel: pendiente
#     aliases: [my new skill, another way to write it]
#
# ══════════════════════════════════════════════════════════════

habilidades:

