# ══════════════════════════════════════════════════════════════
# CONFIGURATION — Job Sentinel  ·  CONFIGURACIÓN — Vigía de Empleo
# ══════════════════════════════════════════════════════════════
#
# This file controls how the job search system works.
# Edit it to suit your preferences. No need to touch the code.
#
# Este archivo controla cómo funciona el buscador de empleo.
# Edítalo según tus preferencias. No necesitas tocar el código.
#
# BASIC YAML SYNTAX / SINTAXIS BÁSICA YAML:
#   key: value                → simple setting  /  ajuste simple
#   - element                 → list item  /  ítem de una lista
#   # text                    → comment (ignored)  /  comentario (el programa lo ignora)
#   true / false              → on/off  /  activado / desactivado
#
# ══════════════════════════════════════════════════════════════


# ──────────────────────────────────────────────────────────────
# 1. PLATFORMS / PLATAFORMAS
# Enable or disable each job source.
# Activa o desactiva cada fuente de ofertas.
# ──────────────────────────────────────────────────────────────

plataformas:
  linkedin: true       # Search on LinkedIn / Busca en LinkedIn
  indeed: true         # Search on Indeed / Busca en Indeed
  climatebase: true    # Search on Climatebase (climate & sustainability jobs, mainly in English and remote / ofertas de clima y sostenibilidad, mayormente en inglés y remotas)


# ──────────────────────────────────────────────────────────────
# 2. GENERAL SETTINGS / CONFIGURACIÓN GENERAL
# ──────────────────────────────────────────────────────────────

configuracion_general:

  # Minimum score (1-10) for a listing to appear in the email.
  # Raise to receive fewer but better-matched results.
  # Lower to see more even if they fit less.
  # Puntuación mínima (1-10) para que una oferta aparezca en el email.
  # Sube el número para recibir menos ofertas pero más ajustadas.
  # Bájalo para ver más aunque encajen menos.
  puntuacion_minima: 4

  # Maximum number of listings analysed by AI per run.
  # Raising this number increases the Claude API cost.
  # Máximo de ofertas que se analizan con IA por ejecución.
  # Subir este número aumenta el coste de la API de Claude.
  max_ofertas: 10

  # AI model for analysing listings.
  # claude-haiku-4-5-20251001  → faster and cheaper (recommended)  /  más rápido y barato (recomendado)
  # claude-sonnet-4-6          → more precise but more expensive  /  más preciso pero más caro
  modelo_ia: "claude-haiku-4-5-20251001"


# ──────────────────────────────────────────────────────────────
# 3. LINKEDIN & INDEED SEARCHES / BÚSQUEDAS EN LINKEDIN E INDEED
# Format: ["search term", "country or city"]
# Add or remove lines to suit what you want to search.
# Formato: ["término de búsqueda", "país o ciudad"]
# Añade o quita líneas según lo que quieras buscar.
# ──────────────────────────────────────────────────────────────

busquedas_linkedin_indeed:
  # ← Replace these examples with your own searches / Reemplaza estos ejemplos con tus propias búsquedas
  - ["Data Analyst", "Spain"]
  - ["Junior Data Analyst", "Spain"]
  - ["Business Intelligence Analyst", "Spain"]
  - ["Analista de datos", "España"]
  - ["Analista de datos junior", "España"]


# ──────────────────────────────────────────────────────────────
# 4. CLIMATEBASE SEARCHES / BÚSQUEDAS EN CLIMATEBASE
# English only (Climatebase indexes mainly in English).
# The "remote only" filter is applied automatically.
# Solo en inglés (Climatebase indexa principalmente en inglés).
# El filtro de "solo remoto" se aplica automáticamente.
# ──────────────────────────────────────────────────────────────

busquedas_climatebase:
  # ← Replace these examples with your own searches / Reemplaza estos ejemplos con tus propias búsquedas
  - "data analyst"
  - "sustainability data analyst"


# ──────────────────────────────────────────────────────────────
# 5. TARGET COMPANIES / EMPRESAS DE INTERÉS
# Listings from these companies appear marked with 🎯 in the email.
# Other listings are not discarded — it's just a visual marker.
# Write names in lowercase.
# Las ofertas de estas empresas aparecen marcadas con 🎯 en el email.
# No se descartan otras ofertas — es solo un marcador visual.
# Escribe los nombres en minúsculas.
# ──────────────────────────────────────────────────────────────

empresas_objetivo:

  # ← Replace these examples with companies you're interested in / Reemplaza estos ejemplos con las empresas que te interesen
  tier_1_maxima_prioridad:
    - google
    - microsoft

  tier_2_tech_mediana:
    - stripe
    - datadog

  tier_3_consultoria_y_otros:
    - deloitte
    - accenture
   


# ──────────────────────────────────────────────────────────────
# 6. AUTOMATIC FILTERS / FILTROS AUTOMÁTICOS
# Listings containing these words are discarded without consulting the AI.
# Useful for excluding internships, scholarships, entry-level positions, etc.
# Ofertas que contengan estas palabras se descartan sin consultar la IA.
# Útil para excluir prácticas, becas, puestos sin experiencia, etc.
# ──────────────────────────────────────────────────────────────

palabras_excluir:
  - becario
  - beca
  - prácticas
  - internship
  - intern
  - student
  - estudiante
  - trainee


# ──────────────────────────────────────────────────────────────
# 7. AI CRITERIA / CRITERIOS DE LA IA
# This section defines how Claude evaluates and scores each listing.
# Edit it to change which roles are prioritised,
# which penalties apply to your situation, or which red flags to watch for.
# Esta sección define cómo Claude evalúa y puntúa cada oferta.
# Edítala si quieres cambiar qué tipo de roles se priorizan,
# qué penalizaciones aplican a tu situación o qué señales de alerta vigilar.
# ──────────────────────────────────────────────────────────────

criterios_ia:

  # Sector axes — Claude classifies each listing into one of these axes.
  # 'otros' is a special catch-all (penalised); keep it. The rest are EXAMPLES:
  # rename them and rewrite the descriptions to match your own target sectors.
  # Ejes sectoriales — Claude clasifica cada oferta en uno de estos ejes.
  # 'otros' es un cajón de sastre especial (se penaliza); consérvalo. El resto son
  # EJEMPLOS: renómbralos y reescribe las descripciones según tus sectores objetivo.
  ejes:
    principal: >
      Tu sector o dominio objetivo nº1: el que mejor encaja con tu perfil.
      Describe el tipo de empresa y rol, con ejemplos de empresas si quieres.
      (Ejemplo: "fintech / pagos / banca digital. Empresas tipo Stripe, Adyen, BBVA".)
    secundario_a: >
      Un segundo dominio que también te encaja bien. Renómbralo o bórralo.
      (Ejemplo: "salud / biotech / dispositivos médicos. Empresas tipo Roche, Veeva".)
    secundario_b: >
      Un tercer dominio opcional. Renómbralo o bórralo.
      (Ejemplo: "industria / manufacturing / IoT industrial. Empresas tipo Siemens, ABB".)
    otros: >
      data/ML genérico sin dominio claro, consultoría delivery,
      sectores fuera de los anteriores.

  # Score bands — defines what each score means (1-10).
  # Adapt the descriptions to your profile and what you're looking for.
  # Bandas de puntuación — define qué puntúa cada nota (1-10).
  # Adapta las descripciones a tu perfil y lo que buscas.
  bandas_puntuacion: |
    - 8-10: rol de Data Analyst júnior / entry-level (0-1 años; las prácticas cuentan) con skills de analista (Excel, SQL, BI/dashboards, Python básico) en un eje sectorial relevante. Pide poca o ninguna experiencia: encaja sin estirarse.
    - 6-7: rol de datos de nivel júnior con buen encaje pero algo por encima (pide ~2 años) o con stack/sector algo desplazados.
    - 4-5: rol relacionado con los datos pero de encaje parcial: pide más experiencia de la que tiene el usuario, tecnología que no maneja, o foco principal en otra función.
    - <4: sin relación con el análisis de datos, o claramente sénior.

  # Penalties — subtracted from the base score.
  # Adapt or remove those that don't apply to your situation.
  # Penalizaciones — se restan de la puntuación base.
  # Adapta o elimina las que no apliquen a tu situación.
  penalizaciones:
    # Examples — adapt them to what does NOT fit you / Ejemplos — adáptalos a lo que NO te encaja.
    - "Exige más de ~2 años de experiencia (el usuario acaba de empezar): -2"
    - "El núcleo del puesto es una especialización avanzada (ML/DL, data engineering, MLOps) impropia de un perfil júnior: -1"
    - "Ubicación presencial obligatoria en un sitio donde el usuario no puede/quiere estar: -2"
    - "Remoto limitado a un país que no es el del usuario, sin mención de remoto internacional: -1"

  # What NOT to penalise — explicit instructions so Claude doesn't deduct points for these.
  # Qué NO penalizar — instrucciones explícitas para que Claude no reste puntos por estos motivos.
  no_penalizar:
    - "Idioma de la oferta: las ofertas en inglés son tan válidas como las de español."
    - "Eje no-principal: una oferta puede sacar 8-9 en cualquier eje si encaja técnicamente."
    - "Empresa internacional sin oficina local: si el rol es remoto real, no penalices."
    - "Ofertas internacionales (UK/DE/FR...) que sean remotas pan-europeas reales aunque la 'location' diga una ciudad concreta."

  # Discard criteria — these conditions mark a listing as unsuitable (encaja=false).
  # Criterios de descarte — estas condiciones marcan la oferta como no apta (encaja=false).
  criterios_descarte:
    - "Perfil claramente sénior: exige bastantes años de experiencia"
    - "Relocalización obligatoria sin opción remota"
    - "100% presencial en una ubicación que el usuario no acepta"
    - "Remoto limitado a un país/región fuera del alcance del usuario, sin opción internacional"

  # Red flags — Claude includes them in 'punto_clave' with ⚠️ when detected.
  # Señales de alerta — Claude las incluye en el 'punto_clave' con ⚠️ cuando las detecta.
  senales_alerta:
    - "'serás la primera persona de datos', 'construir el área desde cero', 'reportarás directamente a dirección' (mala señal para un júnior sin mentoría)"
    - "Lista de responsabilidades muy heterogénea (datos + IT + soporte + ...)"
    - "'buscamos autonomía total', 'entorno muy dinámico' como única descripción del puesto"
    - "Stack caótico o proyecto heredado sin documentación ni metodología"
    - "Rol único de datos en la empresa (sin equipo ni nadie sénior de quien aprender)"
