name: 🔍 Vigía de Empleo Semanal

on:
  schedule:
    # Todos los lunes a las 08:00 CET (07:00 UTC)
    - cron: '0 3 * * 1'

  # Permite lanzarlo manualmente desde GitHub para probar
  workflow_dispatch:

jobs:
  buscar-empleo:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ✅ Validar dependencias críticas
        # Falla rápido si jobspy o anthropic no se instalaron correctamente.
        # Sin esto, el workflow corre en modo zombie (sin scoring real) y manda
        # un email con ofertas mal evaluadas.
        run: |
          python -c "import jobspy; print(f'JobSpy {jobspy.__version__ if hasattr(jobspy, \"__version__\") else \"OK\"}')"
          python -c "import anthropic; print(f'Anthropic {anthropic.__version__}')"
          python -c "import requests; print(f'Requests {requests.__version__}')"

      - name: 🔍 Ejecutar búsqueda de empleo
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_ADDRESS:        ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:   ${{ secrets.GMAIL_APP_PASSWORD }}
          DESTINATARIO_EMAIL:   ${{ secrets.DESTINATARIO_EMAIL }}
        run: python job_alert.py

      - name: 💾 Commit skills tracker actualizado
        # Solo commitea si hay cambios reales. Si no, el step pasa sin error.
        run: |
          git config user.name "vigia-bot"
          git config user.email "actions@github.com"
          git add skills_tracker.json
          if git diff --staged --quiet; then
            echo "ℹ️  Sin cambios en skills_tracker.json — no se hace commit"
          else
            git commit -m "📊 skills tracker $(date +%Y-%m-%d)"
            git push
          fi

      - name: 📄 Guardar preview del email (artefacto)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: email-preview-${{ github.run_number }}
          path: email_preview.html
          retention-days: 7
